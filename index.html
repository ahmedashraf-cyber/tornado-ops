<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>Tornado Ops — Hudl Training</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:#0f1117;color:#e8eaf0;height:100vh;overflow:hidden}
:root{--bg:#0f1117;--bg2:#161b27;--bg3:#1e2435;--bg4:#252d40;--b:rgba(255,255,255,.08);--b2:rgba(255,255,255,.14);--t:#e8eaf0;--t2:#8b92a8;--t3:#5a6070;--g:#22c55e;--gb:rgba(34,197,94,.12);--a:#f59e0b;--ab:rgba(245,158,11,.12);--r:#ef4444;--rb:rgba(239,68,68,.12);--bl:#3b82f6;--blb:rgba(59,130,246,.12);--pu:#8b5cf6;--pub:rgba(139,92,246,.12)}

/* LOGIN */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
.lbox{background:var(--bg2);border:1px solid var(--b2);border-radius:16px;padding:36px;width:360px;max-width:94vw}
.llogo{font-size:20px;font-weight:700;margin-bottom:4px}.llogo span{color:var(--bl)}
.lsub{font-size:12px;color:var(--t3);margin-bottom:24px}
.lbox label{font-size:11px;color:var(--t2);display:block;margin-bottom:4px;margin-top:12px;font-weight:500}
.lbox input,.lbox select{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:7px;padding:9px 10px;color:var(--t);font-size:13px;outline:none}
.lbox input:focus,.lbox select:focus{border-color:var(--bl)}
.lbtn{width:100%;margin-top:18px;padding:11px;background:var(--bl);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.lbtn:hover{background:#2563eb}
.lerr{font-size:12px;color:var(--r);margin-top:8px;text-align:center;min-height:18px}
.lhint{font-size:11px;color:var(--t3);text-align:center;margin:16px 0 10px}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dbtn{padding:9px 8px;border:1px solid var(--b2);border-radius:8px;background:var(--bg3);color:var(--t2);font-size:11px;cursor:pointer;text-align:center;transition:background .1s}
.dbtn:hover{background:var(--bg4);color:var(--t)}
.dbtn strong{display:block;color:var(--t);font-size:12px;margin-bottom:2px}

/* APP */
#app{position:fixed;inset:0;display:flex;flex-direction:column}
.topbar{background:var(--bg2);border-bottom:1px solid var(--b);height:48px;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.tlogo{font-weight:700;font-size:14px;letter-spacing:.3px}.tlogo span{color:var(--bl)}
.tright{margin-left:auto;display:flex;align-items:center;gap:8px}
.ubadge{background:var(--bg3);border:1px solid var(--b);border-radius:20px;padding:4px 10px 4px 6px;display:flex;align-items:center;gap:7px;font-size:11px;color:var(--t2)}
.uav{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.nbtn{position:relative;background:var(--bg3);border:1px solid var(--b);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--t2)}
.ndot{position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--r);border-radius:50%;border:1.5px solid var(--bg2);display:none}
.lobtn{background:transparent;border:1px solid var(--b);border-radius:6px;padding:4px 10px;color:var(--t3);font-size:11px;cursor:pointer}
.lobtn:hover{color:var(--t)}

.abody{display:flex;flex:1;overflow:hidden}
.sidebar{width:186px;background:var(--bg2);border-right:1px solid var(--b);overflow-y:auto;padding:8px 0;flex-shrink:0}
.nlabel{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:10px 12px 4px}
.ni{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;color:var(--t2);font-size:12px;margin:1px 6px;transition:background .1s}
.ni:hover{background:var(--bg3);color:var(--t)}
.ni.on{background:var(--blb);color:var(--bl)}
.nbadge{margin-left:auto;background:var(--r);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px}
.nbadge.am{background:var(--a)}

.content{flex:1;overflow-y:auto;padding:18px;background:var(--bg)}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--t2);flex-direction:column;gap:12px}
.spin{width:24px;height:24px;border:2px solid var(--b2);border-top-color:var(--bl);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* PAGE COMPONENTS */

.ptitle{font-size:18px;font-weight:600}
.psub{font-size:12px;color:var(--t2);margin-top:3px}
.pact{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}

.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:14px}
.kc{background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:12px 14px}
.kl{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-bottom:5px}

.card{background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:14px;margin-bottom:12px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ct{font-size:13px;font-weight:600}

.tbl{width:100%;border-collapse:collapse}

.tbl tr:last-child td{border-bottom:none}

.ald.r{background:var(--r)}.ald.b{background:var(--bl)}.ald.g{background:var(--g)}
.alt{font-size:12px;color:var(--t)}.alm{font-size:11px;color:var(--t3);margin-top:2px}

.btn{padding:7px 14px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .1s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btnp{background:var(--bl);color:#fff}.btnp:hover:not(:disabled){background:#2563eb}
.btns{background:var(--bg3);color:var(--t2);border:1px solid var(--b2)}.btns:hover{background:var(--bg4);color:var(--t)}
.btnd{background:var(--rb);color:var(--r);border:1px solid rgba(239,68,68,.3)}
.btnsc{background:var(--gb);color:var(--g);border:1px solid rgba(34,197,94,.3)}
.bsm{padding:4px 10px;font-size:11px}

.fr{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fl{font-size:11px;color:var(--t2);font-weight:500}
.fi{background:var(--bg3);border:1px solid var(--b2);border-radius:7px;padding:8px 10px;color:var(--t);font-size:12px;outline:none;width:100%}
.fi:focus{border-color:var(--bl)}

.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.prog{background:var(--bg4);border-radius:4px;height:5px;overflow:hidden;margin-top:5px}
.pf{height:100%;border-radius:4px;background:var(--g)}.pf.a{background:var(--a)}.pf.r{background:var(--r)}

.ckl{font-size:12px;color:var(--t2)}

.gl{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--b)}
.gl:last-child{border-bottom:none}
.gn{font-size:12px;font-weight:500;flex:1}.gp{flex:1;max-width:120px}

.inv{background:var(--bg3);border-radius:9px;padding:13px;margin-bottom:8px}
.invh{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.invid{font-size:10px;font-family:monospace;color:var(--t3)}

.sc{background:var(--bg3);border-radius:9px;padding:12px;margin-bottom:8px}
.sn{font-size:12px;font-weight:600;margin-bottom:8px}
.sm{display:flex;gap:14px;flex-wrap:wrap}
.sme{font-size:11px;color:var(--t2)}.sme strong{color:var(--t)}

.cal{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.cd{background:var(--bg3);border:1px solid var(--b);border-radius:7px;padding:7px 4px;text-align:center}
.cd.site{border-left:2px solid var(--g)}.cd.line{border-left:2px solid var(--pu)}
.cd.tod{border-color:var(--bl);background:var(--blb)}.cd.past{opacity:.45}
.cdn{font-size:12px;font-weight:700}.cdt{font-size:10px;margin-top:2px;color:var(--t3)}
.cd.site .cdt{color:var(--g)}.cd.line .cdt{color:var(--pu)}

.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--b2);border-radius:10px;padding:12px 18px;font-size:12px;color:var(--t);z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.5);max-width:320px;transform:translateY(80px);opacity:0;transition:all .25s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.g{border-left:3px solid var(--g)}.toast.r{border-left:3px solid var(--r)}.toast.b{border-left:3px solid var(--bl)}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--b2);border-radius:14px;padding:24px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto}
.mt2{font-size:16px;font-weight:600;margin-bottom:4px}.ms2{font-size:12px;color:var(--t2);margin-bottom:18px}
.mact{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}

.notif-panel{position:fixed;top:52px;right:12px;width:320px;background:var(--bg2);border:1px solid var(--b2);border-radius:12px;z-index:150;padding:14px;display:none;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.notif-panel.open{display:block}

@media(max-width:640px){.two,.fg2{grid-template-columns:1fr}.sidebar{display:none}.bcg{grid-template-columns:1fr}}
</style>

<script>
// ── CONFIG ────────────────────────────────────────────────────────
var SB_URL = 'https://vtokbsmbahquckoemodq.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0b2tic21iYWhxdWNrb2Vtb2RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDcyNjcsImV4cCI6MjA5MDk4MzI2N30.22OFbXfPT1-diwIhkenU5hg_CJYoyDw0yL6vJm1PwJk';

// ── DB HELPERS ────────────────────────────────────────────────────
async function db(table, method, body, filters){
  var url = SB_URL+'/rest/v1/'+table;
  if(filters) url += '?'+filters;
  var opts = {
    method: method||'GET',
    headers:{
      'apikey': SB_KEY,
      'Authorization': 'Bearer '+SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': method==='POST'?'return=representation':'',
    }
  };
  if(body) opts.body = JSON.stringify(body);
  var r = await fetch(url, opts);
  if(!r.ok){ var e=await r.text(); throw new Error(e); }
  if(r.status===204) return null;
  return r.json();
}
async function qry(table,filters){ return db(table,'GET',null,filters); }
async function ins(table,data){ return db(table,'POST',data); }
async function upd(table,data,filters){ return db(table,'PATCH',data,filters); }
async function del2(table,filters){ return db(table,'DELETE',null,filters); }

// ── STATE ─────────────────────────────────────────────────────────
var CU = null; // current user
var CB = null; // current batch (for supervisor/supporter)
var attState = {};
var eodCks = {};

// ── AUTH ──────────────────────────────────────────────────────────
document.getElementById('lbtn').onclick = function(){ doLogin(); };
document.getElementById('lu').onkeydown = function(e){ if(e.key==='Enter') doLogin(); };
document.getElementById('lp').onkeydown = function(e){ if(e.key==='Enter') doLogin(); };

async function quickL(u,p){
  document.getElementById('lu').value=u;
  document.getElementById('lp').value=p;
  doLogin();
}

async function doLogin(){
  var u=document.getElementById('lu').value.trim();
  var p=document.getElementById('lp').value.trim();
  var btn=document.getElementById('lbtn');
  var err=document.getElementById('lerr');
  err.textContent='';
  if(!u||!p){err.textContent='Enter username and password.';return;}
  btn.textContent='Signing in...';btn.disabled=true;
  try{
    var rows = await qry('users','username=eq.'+encodeURIComponent(u)+'&password=eq.'+encodeURIComponent(p)+'&select=*');
    if(!rows||!rows.length){err.textContent='Wrong username or password.';btn.textContent='Sign In →';btn.disabled=false;return;}
    CU = rows[0];
    sessionStorage.setItem('to_user', JSON.stringify(CU));
    enterApp();
  }catch(e){
    err.textContent='Connection error. Check internet.';
    btn.textContent='Sign In →';btn.disabled=false;
  }
}

function doLogout(){
  CU=null;CB=null;
  sessionStorage.removeItem('to_user');
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
  document.getElementById('lbtn').textContent='Sign In →';
  document.getElementById('lbtn').disabled=false;
}

function enterApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('uname').textContent=CU.name;
  document.getElementById('urole').textContent=CU.role;
  document.getElementById('uav').textContent=CU.initials||CU.name.slice(0,2).toUpperCase();
  document.getElementById('uav').style.background=CU.color||'#3b82f6';
  buildNav();
  loadAlerts();
}

// restore session on reload
var saved = sessionStorage.getItem('to_user');
if(saved){ try{ CU=JSON.parse(saved); enterApp(); }catch(e){} }

var curPage='';
function buildNav(){
  var cfg=NAVS[CU.role]||[];
  var nav=document.getElementById('nav');nav.innerHTML='';
  cfg.forEach(function(sec){
    var d=document.createElement('div');
    d.innerHTML='<div class="nlabel">'+sec.sec+'</div>';
    sec.items.forEach(function(item){
      var n=document.createElement('div');n.className='ni';n.id='n_'+item.id;
      n.innerHTML=item.i+' '+item.t+(item.badge!==undefined?'<span class="nbadge '+(item.bc||'')+'" id="nb_'+item.id+'">'+item.badge+'</span>':'');
      n.onclick=(function(id){return function(){go(id);};})(item.id);
      d.appendChild(n);
    });
    nav.appendChild(d);
  });
  var first=cfg[0]&&cfg[0].items[0]&&cfg[0].items[0].id;
  if(first) go(first);
}
function go(id){
  curPage=id;
  document.querySelectorAll('.ni').forEach(function(n){n.classList.remove('on');});
  var el=document.getElementById('n_'+id);if(el)el.classList.add('on');
  var pg=document.getElementById('pg');
  pg.innerHTML=loader();
  if(renders[id]) renders[id]();
}
function loader(){return '<div class="loading"><div class="spin"></div><div style="color:var(--t3);font-size:12px">Loading...</div></div>';}

  var outs=batches.reduce(function(s,b){return s+b.outlier_count;},0);
  var lvs=batches.reduce(function(s,b){return s+b.leaver_count;},0);

  '</div>');
};
async function getPersist(bid){
  var rows = await qry('mistake_log','batch_id=eq.'+bid+'&order=logged_at.desc');
  var m={};
  rows.forEach(function(r){var k=r.trainee_name+'|'+r.error_category+'|'+r.task;if(!m[k])m[k]={trainee_name:r.trainee_name,error_category:r.error_category,task:r.task,cnt:0};m[k].cnt++;});
  return Object.values(m).filter(function(x){return x.cnt>=3;});
}

// SUPERVISOR — FINAL CHECK
renders.sf = async function(){
  var batches = await qry('batches','active=eq.true&order=created_at.desc');
  if(!batches.length){set('<div class="phdr"><div class="ptitle">No Active Batches</div></div>');return;}
  CB=batches[0];
  var thr=CB.pass_threshold||70;
  var checks = await qry('final_checks','batch_id=eq.'+CB.id+'&order=created_at.desc');
  var wks=[...new Set(checks.map(function(c){return c.week_number;}))].sort(function(a,b){return b-a;});
  var curWk=wks[0]||CB.week_current;
  var cks=checks.filter(function(c){return c.week_number===curWk;});
  var pass=cks.filter(function(c){return c.score>=thr;}).length;
  var fail=cks.filter(function(c){return c.score<thr-5;}).length;
  var bord=cks.filter(function(c){return c.score>=thr-5&&c.score<thr;}).length;
  set('<div class="phdr"><div class="ptitle">Final Check — Week '+curWk+'</div><div class="psub">Pass threshold: '+thr+'% · '+cks.length+' trainees assessed</div>'+
  '<div class="pact"><button class="btn btnp" onclick="enterFCScores()">+ Enter Scores</button></div></div>'+
  '<div class="kg">'+kc('Pass',pass,'g','')+kc('Borderline',bord,'a','')+kc('Fail',fail,'r','')+kc('Pass Rate',cks.length?Math.round(pass/cks.length*100)+'%':'—','','')+'</div>'+
  (cks.length?'<div class="card"><div class="ch"><div class="ct">Progression Decisions</div></div>'+
  '<div style="display:grid;grid-template-columns:2fr 80px 110px 160px;gap:8px;padding:6px 0;border-bottom:1px solid var(--b)">'+['Trainee','Score','Status','Decision'].map(function(h){return '<div style="font-size:10px;color:var(--t3);text-transform:uppercase;font-weight:600;letter-spacing:.6px">'+h+'</div>';}).join('')+'</div>'+
  cks.map(function(fc){
    var st=fc.score>=thr?'Pass':fc.score>=thr-5?'Borderline':'Fail';var cl=st==='Pass'?'g':st==='Borderline'?'a':'r';
    return '<div style="display:grid;grid-template-columns:2fr 80px 110px 160px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--b)">'+
    '<div style="font-size:12px;font-weight:500">'+fc.trainee_name+'</div>'+
    '<div><span class="pill '+cl+'">'+fc.score+'%</span></div>'+
    '<div style="font-size:11px;color:var(--)'+cl+'">'+st+'</div>'+
    '<div>'+(fc.decision?'<span class="pill '+(fc.decision==='Continue'?'g':fc.decision==='Remove'?'r':'a')+'">'+fc.decision+'</span>':
    (st!=='Pass'?'<select class="fi" style="padding:4px 7px;font-size:11px" onchange="saveFCDec(\''+fc.id+'\',this.value)"><option value="">— Decide —</option>'+(st==='Fail'?'<option>Outlier Program</option><option>Remove</option>':'<option>Continue</option><option>Outlier Program</option>')+'</select>':'<span class="pill g">Auto continue</span>'))+'</div>'+
    '</div>';
  }).join('')+'</div>':'<div class="card"><div style="color:var(--t3);font-size:12px">No Final Check scores entered for Week '+curWk+' yet. Click "+ Enter Scores" to add them.</div></div>'));
};
async function saveFCDec(id,dec){
  if(!dec)return;
  await upd('final_checks',{decision:dec,decision_date:new Date().toISOString()},'id=eq.'+id);
  // if outlier program, update trainee status
  var fc=(await qry('final_checks','id=eq.'+id))[0];
  if(dec==='Outlier Program') await upd('trainees',{status:'Outlier'},'id=eq.'+fc.trainee_id);
  if(dec==='Remove') await upd('trainees',{status:'Leaver'},'id=eq.'+fc.trainee_id);
  toast('Decision saved','g');renders.sf();
}

  set('<div class="phdr"><div class="ptitle">Trainee Intake</div><div class="psub">'+CB.name+' · '+trainees.length+' enrolled</div>'+
  '<div class="pact"><button class="btn btnp" onclick="addTraineeModal()">+ Add Trainee</button><button class="btn btns" onclick="importFromCandidates()">Import Accepted Candidates</button></div></div>'+
  '<div class="card"><input class="si" id="tsi" placeholder="Search trainees..." oninput="filterTrainees(this.value)"/>'+
  '<table class="tbl" id="ttbl"><thead><tr><th>Name</th><th>National ID</th><th>Score</th><th>Performance</th><th>Supporter</th><th>Status</th></tr></thead>'+
  '<tbody>'+trainees.map(function(t){return tRow(t,pc,sc);}).join('')+'</tbody></table></div>');
};
function tRow(t,pc,sc){return '<tr><td>'+t.name+'</td><td style="font-family:monospace;font-size:11px;color:var(--t3)">'+(t.national_id||'—')+'</td><td>'+(t.interview_score||'—')+'</td><td><span class="pill '+(pc[t.performance]||'gr')+'">'+(t.performance||'—')+'</span></td><td style="color:var(--t2)">'+(t.supporter_name||'—')+'</td><td><span class="pill '+(sc[t.status]||'gr')+'">'+t.status+'</span></td></tr>';}
async function filterTrainees(q){
  var q2=q.toLowerCase();
  var rows=await qry('trainees','batch_id=eq.'+CB.id+'&order=name.asc');
  var pc={High:'g',Average:'b',Low:'r'};var sc={Active:'g',Outlier:'a',Leaver:'r'};
  var tbl=document.getElementById('ttbl');if(!tbl)return;
  tbl.querySelector('tbody').innerHTML=rows.filter(function(t){return t.name.toLowerCase().includes(q2)||(t.national_id||'').includes(q2);}).map(function(t){return tRow(t,pc,sc);}).join('');
}
async function importFromCandidates(){
  var cands=await qry('candidates','status=eq.Accepted&batch_name=eq.'+encodeURIComponent(CB.name));
  if(!cands.length){toast('No accepted candidates found for '+CB.name,'b');return;}
  for(var i=0;i<cands.length;i++){
    var c=cands[i];
    await ins('trainees',{batch_id:CB.id,name:c.name,national_id:c.national_id,interview_score:c.total_points,performance:c.performance,status:'Active',supporter_name:'Sara Khalil'});
  }
  await upd('batches',{trainees_count:cands.length},'id=eq.'+CB.id);
  toast(cands.length+' candidates imported as trainees','g');renders.ci();
}

// COORDINATOR — ATTENDANCE
renders.ca = async function(){
  var batches=await qry('batches','active=eq.true&order=created_at.desc');if(!batches.length){set('');return;}CB=batches[0];
  var today=new Date().toISOString().split('T')[0];
  var att=await qry('attendance_log','batch_id=eq.'+CB.id+'&date=eq.'+today);
  var present=att.filter(function(a){return a.status==='Present';}).length;
  var absent=att.filter(function(a){return a.status==='Absent';}).length;
  var late=att.filter(function(a){return a.status==='Late';}).length;
  var online=att.filter(function(a){return a.status==='Online';}).length;
  set('<div class="phdr"><div class="ptitle">Attendance Overview</div><div class="psub">'+CB.name+' — Today · Live</div></div>'+
  '<div class="kg">'+kc('Present',present,'g','')+kc('Absent',absent,'r','')+kc('Late',late,'a','')+kc('Online',online,'b','')+'</div>'+
  '<div class="card"><div class="ch"><div class="ct">Today\'s Records</div></div>'+
  (att.length?'<table class="tbl"><thead><tr><th>Trainee</th><th>Status</th><th>Submitted By</th><th>Time</th></tr></thead><tbody>'+
  att.map(function(a){return '<tr><td>'+a.trainee_name+'</td><td><span class="pill '+(a.status==='Present'?'g':a.status==='Absent'?'r':a.status==='Late'?'a':'b')+'">'+a.status+'</span></td><td style="color:var(--t2)">'+(a.submitted_by||'—')+'</td><td style="color:var(--t3)">'+new Date(a.submitted_at).toLocaleTimeString()+'</td></tr>';}).join('')+'</tbody></table>':'<div style="color:var(--t3);font-size:12px">No attendance submitted yet today</div>')+
  '</div>');
};

// COORDINATOR — ROOMS
renders.cr2 = async function(){
  var batches=await qry('batches','active=eq.true&order=created_at.desc');if(!batches.length){set('');return;}CB=batches[0];
  var rooms=await qry('room_reservations','batch_id=eq.'+CB.id+'&order=day_number.asc');
  set('<div class="phdr"><div class="ptitle">Room Reservations</div><div class="psub">'+CB.name+' — onsite days</div>'+
  '<div class="pact"><button class="btn btnp" onclick="addRoomModal(\''+CB.id+'\')">+ Add Reservation</button></div></div>'+
  '<div class="card">'+
  (rooms.length?'<table class="tbl"><thead><tr><th>Day</th><th>Date</th><th>Room</th><th>Confirmed</th><th>Reminder</th><th></th></tr></thead><tbody>'+
  rooms.map(function(r){return '<tr><td>Day '+r.day_number+'</td><td>'+(r.date||'—')+'</td><td>'+(r.room_name||'Not assigned')+'</td>'+
  '<td><span class="pill '+(r.confirmed?'g':'a')+'">'+(r.confirmed?'Yes':'No')+'</span></td>'+
  '<td><span class="pill '+(r.reminder_sent?'g':'a')+'">'+(r.reminder_sent?'Sent':'Pending')+'</span></td>'+
  '<td><button class="btn btns bsm" onclick="confirmRoom(\''+r.id+'\')">Confirm</button></td></tr>';}).join('')+'</tbody></table>':'<div style="color:var(--t3);font-size:12px">No room reservations yet</div>')+
  '</div>');
};
async function confirmRoom(id){
  await upd('room_reservations',{confirmed:true,reminder_sent:true},'id=eq.'+id);
  toast('Room confirmed — reminder scheduled','g');renders.cr2();
}

// COORDINATOR — LEAVERS
renders.cl = async function(){
  var batches=await qry('batches','active=eq.true&order=created_at.desc');if(!batches.length){set('');return;}CB=batches[0];
  var leavers=await qry('leavers','batch_id=eq.'+CB.id+'&order=created_at.desc');
  var active=await qry('trainees','batch_id=eq.'+CB.id+'&status=eq.Active');
  set('<div class="phdr"><div class="ptitle">Leaver Records</div><div class="psub">'+CB.name+' — '+leavers.length+' leavers</div></div>'+
  '<div class="two"><div class="card"><div class="ch"><div class="ct">Submit Leaver Record</div></div>'+
  '<div class="fr"><div class="fl">Trainee</div><select class="fi" id="lv1"><option value="">— Select —</option>'+active.map(function(t){return '<option value="'+t.id+'|'+t.name+'">'+t.name+'</option>';}).join('')+'</select></div>'+
  '<div class="fr"><div class="fl">Date</div><input class="fi" id="lv2" type="date" value="'+new Date().toISOString().split('T')[0]+'"/></div>'+
  '<div class="fr"><div class="fl">Reason</div><select class="fi" id="lv3"><option>Fail</option><option>Dropout</option><option>Other</option></select></div>'+
  '<div class="fr"><div class="fl">Final Check score (if Fail)</div><input class="fi" id="lv4" type="number" placeholder="e.g. 58"/></div>'+
  '<button class="btn btnp" onclick="subLeaver(\''+CB.id+'\')">Submit Leaver Record</button></div>'+
  '<div class="card"><div class="ch"><div class="ct">Leavers</div></div>'+
  (leavers.length?'<table class="tbl"><thead><tr><th>Name</th><th>Date</th><th>Reason</th><th>Score</th></tr></thead><tbody>'+
  leavers.map(function(l){return '<tr><td>'+l.trainee_name+'</td><td>'+l.date+'</td><td><span class="pill '+(l.reason==='Fail'?'r':l.reason==='Dropout'?'a':'gr')+'">'+l.reason+'</span></td><td>'+(l.final_check_score||'—')+'</td></tr>';}).join('')+'</tbody></table>':'<div style="color:var(--t3);font-size:12px">No leavers yet</div>')+
  '</div></div>');
};
async function subLeaver(bid){
  var val=document.getElementById('lv1').value;if(!val){toast('Select a trainee','r');return;}
  var parts=val.split('|');var tid=parts[0];var tname=parts.slice(1).join('|');
  var reason=document.getElementById('lv3').value;
  var score=document.getElementById('lv4').value;
  await upd('trainees',{status:'Leaver'},'id=eq.'+tid);
  await ins('leavers',{batch_id:bid,trainee_name:tname,date:document.getElementById('lv2').value,reason:reason,final_check_score:score||null,submitted_by:CU.name});
  var batch=await qry('batches','id=eq.'+bid);
  await upd('batches',{leaver_count:(batch[0].leaver_count||0)+1},'id=eq.'+bid);
  await ins('alerts',{type:'a',text:'Leaver: '+tname+' — Reason: '+reason+(score?' (FC: '+score+'%)':''),batch_id:bid,target_role:'supervisor'});
  toast(tname+' marked as leaver — Supervisor notified','g');renders.cl();
}

// ── MODALS ────────────────────────────────────────────────────────
function showModal(html){document.getElementById('mb').innerHTML=html;document.getElementById('ov').style.display='flex';}
function closeModal(){document.getElementById('ov').style.display='none';}
document.getElementById('ov').onclick=function(e){if(e.target===this)closeModal();};

function addCandModal(){
  showModal('<div class="mt2">Add Candidate</div><div class="ms2">Stored in pipeline — link to batch when accepted</div>'+
  '<div class="fg2"><div class="fr"><div class="fl">Full name</div><input class="fi" id="ac1"/></div><div class="fr"><div class="fl">National ID</div><input class="fi" id="ac2"/></div></div>'+
  '<div class="fg2"><div class="fr"><div class="fl">Total Points</div><input class="fi" id="ac3" type="number"/></div><div class="fr"><div class="fl">Status</div><select class="fi" id="ac4"><option>Pending</option><option>Accepted</option><option>Rejected</option></select></div></div>'+
  '<div class="fg2"><div class="fr"><div class="fl">Batch (if accepted)</div><input class="fi" id="ac5" placeholder="e.g. Batch 82"/></div><div class="fr"><div class="fl">Interviewer</div><input class="fi" id="ac6"/></div></div>'+
  '<div class="mact"><button class="btn btns" onclick="closeModal()">Cancel</button><button class="btn btnp" onclick="addCand()">Add</button></div>');
}
async function addCand(){
  var n=document.getElementById('ac1').value;if(!n){toast('Name required','r');return;}
  var pts=parseFloat(document.getElementById('ac3').value)||0;
  await ins('candidates',{name:n,national_id:document.getElementById('ac2').value,total_points:pts,performance:pts>=80?'High':pts>=65?'Average':'Low',status:document.getElementById('ac4').value,batch_name:document.getElementById('ac5').value,interviewer:document.getElementById('ac6').value});
  closeModal();toast(n+' added to pipeline','g');renders.mc();
}

function addTraineeModal(){
  showModal('<div class="mt2">Add Trainee</div><div class="ms2">Or use Import to bulk-add from accepted candidates</div>'+
  '<div class="fg2"><div class="fr"><div class="fl">Full name</div><input class="fi" id="at1"/></div><div class="fr"><div class="fl">National ID</div><input class="fi" id="at2"/></div></div>'+
  '<div class="fg2"><div class="fr"><div class="fl">Interview score</div><input class="fi" id="at3" type="number"/></div>'+
  '<div class="fr"><div class="fl">Supporter</div><select class="fi" id="at4"><option>Sara Khalil</option><option>Ahmed Tarek</option></select></div></div>'+
  '<div class="mact"><button class="btn btns" onclick="closeModal()">Cancel</button><button class="btn btnp" onclick="addTrainee()">Add</button></div>');
}
async function addTrainee(){
  var n=document.getElementById('at1').value;if(!n){toast('Name required','r');return;}
  var sc=parseFloat(document.getElementById('at3').value)||0;
  await ins('trainees',{batch_id:CB.id,name:n,national_id:document.getElementById('at2').value,interview_score:sc,performance:sc>=80?'High':sc>=65?'Average':'Low',status:'Active',supporter_name:document.getElementById('at4').value});
  var batch=await qry('batches','id=eq.'+CB.id);
  await upd('batches',{trainees_count:(batch[0].trainees_count||0)+1},'id=eq.'+CB.id);
  closeModal();toast(n+' added to batch','g');renders.ci();
}

function openInvModal(){
  showModal('<div class="mt2">Open New Investigation</div><div class="ms2">Case ID auto-generated · visible to Supervisor and Training Manager only</div>'+
  '<div class="fr"><div class="fl">Person involved</div><input class="fi" id="iv1" placeholder="Full name"/></div>'+
  '<div class="fg2"><div class="fr"><div class="fl">Person type</div><select class="fi" id="iv2"><option>Trainee</option><option>Supporter</option></select></div>'+
  '<div class="fr"><div class="fl">Type</div><select class="fi" id="iv3"><option>Policy</option><option>Performance</option><option>Behaviour</option><option>Attendance</option></select></div></div>'+
  '<div class="fr"><div class="fl">Description</div><textarea class="fi" id="iv4" placeholder="Describe the incident..."></textarea></div>'+
  '<div class="fr"><div class="fl">Immediate action taken</div><input class="fi" id="iv5" placeholder="e.g. Verbal warning..."/></div>'+
  '<div class="mact"><button class="btn btns" onclick="closeModal()">Cancel</button><button class="btn btnd" onclick="createInv()">Open Investigation</button></div>');
}
async function createInv(){
  var p=document.getElementById('iv1').value;if(!p){toast('Enter person name','r');return;}
  var batches=await qry('batches','active=eq.true&order=created_at.desc');
  var bid=batches[0]?batches[0].id:null;
  var id='INV-'+String(Date.now()).slice(-4);
  await ins('investigations',{id:id,batch_id:bid,opened_date:new Date().toISOString().split('T')[0],person_name:p,person_type:document.getElementById('iv2').value,investigation_type:document.getElementById('iv3').value,description:document.getElementById('iv4').value,evidence_available:true,immediate_action:document.getElementById('iv5').value,status:'Open',checklist_steps:[false,false,false,false,false,false,false],opened_by:CU.name});
  await ins('alerts',{type:'r',text:'New investigation '+id+' opened: '+p,batch_id:bid,target_role:'manager'});
  closeModal();toast('Investigation '+id+' opened — Training Manager notified','g');go('si');
}

function enterFCScores(){
  showModal('<div class="mt2">Enter Final Check Scores</div><div class="ms2">Week '+CB.week_current+' · '+CB.name+'</div>'+
  '<div class="fr"><div class="fl">Trainee name</div><input class="fi" id="fct1" placeholder="Trainee full name"/></div>'+
  '<div class="fr"><div class="fl">Score (%)</div><input class="fi" id="fct2" type="number" min="0" max="100" placeholder="0-100"/></div>'+
  '<div class="mact"><button class="btn btns" onclick="closeModal()">Cancel</button><button class="btn btnp" onclick="saveFCScore()">Save Score</button></div>');
}
async function saveFCScore(){
  var name=document.getElementById('fct1').value;var score=parseFloat(document.getElementById('fct2').value);
  if(!name||isNaN(score)){toast('Enter name and score','r');return;}
  var t=(await qry('trainees','batch_id=eq.'+CB.id+'&name=ilike.'+encodeURIComponent('%'+name+'%')))[0];
  await ins('final_checks',{batch_id:CB.id,trainee_id:t?t.id:null,trainee_name:name,week_number:CB.week_current,score:score,entered_by:CU.name});
  await ins('alerts',{type:'b',text:'Final Check Week '+CB.week_current+' scores entered — ready for decisions',batch_id:CB.id,target_role:'supervisor'});
  closeModal();toast('Score saved for '+name,'g');renders.sf();
}

function addRoomModal(bid){
  showModal('<div class="mt2">Add Room Reservation</div>'+
  '<div class="fr"><div class="fl">Day number</div><input class="fi" id="rm1" type="number" min="1" max="25" placeholder="e.g. 15"/></div>'+
  '<div class="fr"><div class="fl">Date</div><input class="fi" id="rm2" type="date"/></div>'+
  '<div class="fr"><div class="fl">Room name</div><select class="fi" id="rm3"><option>Training Room A</option><option>Training Room B</option><option>Training Room C</option></select></div>'+
  '<div class="mact"><button class="btn btns" onclick="closeModal()">Cancel</button><button class="btn btnp" onclick="saveRoom(\''+bid+'\')">Save</button></div>');
}
async function saveRoom(bid){
  var day=parseInt(document.getElementById('rm1').value);
  if(!day){toast('Enter day number','r');return;}
  await ins('room_reservations',{batch_id:bid,day_number:day,date:document.getElementById('rm2').value,room_name:document.getElementById('rm3').value,confirmed:false,reminder_sent:false});
  closeModal();toast('Room reservation saved','g');renders.cr2();
}

// ── ALERTS ────────────────────────────────────────────────────────
async function loadAlerts(){
  var unread=await qry('alerts','read=eq.false&order=created_at.desc&limit=10');
  document.getElementById('ndot').style.display=unread.length?'block':'none';
  var list=document.getElementById('nlist');
  list.innerHTML=unread.length?unread.map(function(a){return al(a.type,a.text,new Date(a.created_at).toLocaleTimeString());}).join(''):'<div style="color:var(--t3);font-size:12px">No new alerts</div>';
}
async function markAllRead(){
  await upd('alerts',{read:true},'read=eq.false');
  document.getElementById('ndot').style.display='none';
  toast('All alerts marked as read','g');
  if(curPage==='mb') renders.mb();
}
function toggleNotif(){
  var p=document.getElementById('npanel');p.classList.toggle('open');
  if(p.classList.contains('open')) loadAlerts();
}
function closeNotif(){document.getElementById('npanel').classList.remove('open');}

// ── HELPERS ───────────────────────────────────────────────────────
function set(html){document.getElementById('pg').innerHTML=html;}
function kc(label,val,cls,note){return '<div class="kc"><div class="kl">'+label+'</div><div class="kv '+(cls||'')+'">'+val+'</div>'+(note?'<div class="kn">'+note+'</div>':'')+'</div>';}
function al(type,txt,time){return '<div class="al '+type+'"><div class="ald '+type+'"></div><div><div class="alt">'+txt+'</div><div class="alm">'+time+'</div></div></div>';}

var _t;
function toast(msg,type){
  var el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show '+(type||'g');
  clearTimeout(_t);_t=setTimeout(function(){el.className='toast';},3200);
}

// refresh alerts every 30 seconds
setInterval(function(){if(CU) loadAlerts();},30000);
</script>
