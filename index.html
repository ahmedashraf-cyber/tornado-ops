  function initApp(){
    // Load or create data
    var raw = localStorage.getItem('topsdata');
    if(raw){ try{ D = JSON.parse(raw); }catch(e){ D = makeDefaultData(); } }
    else { D = makeDefaultData(); save(); }

    // Wire login buttons - direct onclick assignments
    document.getElementById('lbtn').onclick = doLogin;
    document.getElementById('lu').onkeydown = function(e){ if(e.key==='Enter') doLogin(); };
    document.getElementById('lp').onkeydown = function(e){ if(e.key==='Enter') doLogin(); };
    document.getElementById('d_manager').onclick    = function(){ login('jd'); };
    document.getElementById('d_supervisor').onclick = function(){ login('karim'); };
    document.getElementById('d_supporter').onclick  = function(){ login('sara'); };
    document.getElementById('d_coordinator').onclick= function(){ login('layla'); };
    document.getElementById('lobtn').onclick = doLogout;
    document.getElementById('ov').onclick = function(e){ if(e.target===this) closeModal(); };

    // Auto-login if session saved
    var s = sessionStorage.getItem('cu');
    if(s){ try{ CU=JSON.parse(s); showApp(); }catch(e){} }
  }

    return '<div class="ph"><div class="pt">Attendance Overview</div><div class="ps">Batch 82 — Live</div></div>'+
    '<div class="kg">'+kc('Present',18,'g','')+kc('Absent',2,'r','')+kc('Late',2,'a','')+kc('Online',0,'b','')+'</div>'+
    '<div class="card"><div class="ch"><div class="ct">Supporter Submission Status</div></div>'+
    '<table class="tbl"><thead><tr><th>Supporter</th><th>Trainees</th><th>Time</th><th>Status</th></tr></thead><tbody>'+
    '<tr><td>Sara Khalil</td><td>'+D.trainees.filter(function(t){return t.sup==='Sara Khalil';}).length+'</td><td style="color:#5a6070">08:17 AM</td><td>'+pill('g','On Time')+'</td></tr>'+
    '<tr><td>Ahmed Tarek</td><td>'+D.trainees.filter(function(t){return t.sup==='Ahmed Tarek';}).length+'</td><td style="color:#ef4444">Not submitted</td><td>'+pill('r','Alert Sent')+'</td></tr>'+
    '</tbody></table></div>';
  };

  PAGES.cr = function(){
    return '<div class="ph"><div class="pt">Room Reservations</div><div class="ps">Batch 82 — onsite days</div></div>'+
    '<div class="card"><table class="tbl"><thead><tr><th>Day</th><th>Date</th><th>Room</th><th>Confirmed</th></tr></thead><tbody>'+
    [{d:3,dt:'Mar 19',r:'Training Room A',c:true},{d:8,dt:'Mar 26',r:'Training Room A',c:true},{d:12,dt:'Apr 1',r:'Training Room B',c:true},{d:15,dt:'Apr 6',r:'',c:false},{d:16,dt:'Apr 7',r:'',c:false}].map(function(r){
      return '<tr><td>Day '+r.d+'</td><td>'+r.dt+'</td><td>'+(r.r||'<select class="fi" style="padding:3px 6px;font-size:11px;width:150px"><option>— Assign —</option><option>Training Room A</option><option>Training Room B</option><option>Training Room C</option></select>')+'</td>'+
      '<td>'+pill(r.c?'g':'a',r.c?'Confirmed':'Pending')+(r.c?'':'  <button class="btn btnp bsm" onclick="toast(\'Room confirmed\',\'g\')">Confirm</button>')+'</td></tr>';
    }).join('')+'</tbody></table></div>';
  };

  PAGES.cl = function(){
    var active=D.trainees.filter(function(t){return t.bid==='b82'&&t.status==='Active';});
    return '<div class="ph"><div class="pt">Leaver Records</div><div class="ps">Batch 82 — '+D.leavers.length+' leavers</div></div>'+
    '<div class="two"><div class="card"><div class="ch"><div class="ct">Submit Leaver Record</div></div>'+
    '<div class="fr"><div class="fl">Trainee</div><select class="fi" id="lv1"><option value="">— Select —</option>'+active.map(function(t){return '<option value="'+t.id+'">'+t.name+'</option>';}).join('')+'</select></div>'+
    '<div class="fr"><div class="fl">Date</div><input class="fi" id="lv2" type="date" value="'+new Date().toISOString().split('T')[0]+'"/></div>'+
    '<div class="fr"><div class="fl">Reason</div><select class="fi" id="lv3"><option>Fail</option><option>Dropout</option><option>Other</option></select></div>'+
    '<div class="fr"><div class="fl">Final Check score (if Fail)</div><input class="fi" id="lv4" type="number" placeholder="e.g. 58"/></div>'+
    '<button class="btn btnp" onclick="subLeaver()">Submit</button></div>'+
    '<div class="card"><div class="ch"><div class="ct">Leavers</div></div>'+
    '<table class="tbl"><thead><tr><th>Name</th><th>Date</th><th>Reason</th><th>Score</th></tr></thead><tbody>'+
    D.leavers.map(function(l){return '<tr><td>'+l.name+'</td><td>'+l.dt+'</td><td>'+pill(l.reason==='Fail'?'r':'a',l.reason)+'</td><td>'+(l.score||'—')+'</td></tr>';}).join('')+
    '</tbody></table></div></div>';
  };
  window.subLeaver = function(){
    var tid=document.getElementById('lv1').value;var t=D.trainees.find(function(x){return x.id===tid;});
    if(!t){toast('Select a trainee','r');return;}
    t.status='Leaver';
    var b=D.batches.find(function(x){return x.id==='b82';});if(b)b.lv++;
    D.leavers.push({id:'lv'+Date.now(),bid:'b82',name:t.name,dt:document.getElementById('lv2').value,reason:document.getElementById('lv3').value,score:document.getElementById('lv4').value||null});
    D.alerts.unshift({type:'a',txt:'Leaver: '+t.name+' — '+document.getElementById('lv3').value,time:'Just now'});
    save();toast(t.name+' marked as leaver','g');gotoPage('cl');
  };

})(); // end IIFE
</script>
