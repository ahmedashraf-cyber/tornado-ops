// ── AUTH ──────────────────────────────────────────────────────────────
function login(role, name, color, ini){
  CU = {role:role, name:name, color:color, ini:ini};
  try{ sessionStorage.setItem('cu', JSON.stringify(CU)); }catch(e){}
  document.getElementById('login').style.display = 'none';
  var app = document.getElementById('app');
  app.style.display = 'flex';
  document.getElementById('uname').textContent = name;
  document.getElementById('urole').textContent = role;
  document.getElementById('uav').textContent = ini;
  document.getElementById('uav').style.background = color;
  buildNav();
}

function doLogin(){
  var u = document.getElementById('lu').value.trim().toLowerCase();
  var p = document.getElementById('lp').value.trim();
  var err = document.getElementById('lerr');
  err.textContent = '';
  var map = {
    'jd':    ['manager','JD Sanders','#8b5cf6','JD'],
    'karim': ['supervisor','Karim Hassan','#3b82f6','KH'],
    'sara':  ['supporter','Sara Khalil','#22c55e','SK'],
    'ahmed': ['supporter','Ahmed Tarek','#22c55e','AT'],
    'layla': ['coordinator','Layla Ibrahim','#f59e0b','LI'],
  };
  if(!u){ err.textContent='Enter your username'; return; }
  var acc = map[u];
  if(acc && (p===''||p==='admin123')){
    login(acc[0],acc[1],acc[2],acc[3]);
  } else {
    err.textContent = 'Use: jd / karim / sara / layla with password admin123';
  }
}

function doLogout(){
  CU = null;
  try{ sessionStorage.removeItem('cu'); }catch(e){}
  document.getElementById('app').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
}

// Restore session

function crtInv(){ var p=document.getElementById('iv1').value; if(!p){toast('Enter name','r');return;} var d=getD(); var id='INV-'+String(d.invs.length+10).padStart(3,'0'); d.invs.unshift({id:id,bid:'b82',dt:new Date().toISOString().split('T')[0],person:p,ptype:document.getElementById('iv2').value,type:document.getElementById('iv3').value,desc:document.getElementById('iv4').value,status:'Open',steps:[false,false,false,false,false,false,false]}); d.alerts.unshift({type:'r',txt:'New investigation '+id+': '+p,time:'Just now'}); saveD(); closeModal(); toast(id+' opened','g'); go(curPg); }

PG.pa = function(){

  var lbl={Present:'Present',Late:'Late',Absent:'Absent',Online:'Online'};
  return '<div class="ph"><div class="pt">Attendance — Day '+b.day+'</div><div class="ps">Submit by 8:30 AM · '+myT.length+' trainees</div></div>'+
  '<div class="card"><div class="ch"><div class="ct">My Trainee Group</div></div>'+
  myT.map(function(t){return '<div class="ar"><div class="an">'+t.name+'</div><div class="abs">'+
  ['Present','Late','Absent','Online'].map(function(s){var cls={Present:'ap',Late:'al2',Absent:'aa',Online:'ao'}[s]; return '<button class="ab '+(d.attState[t.id]===s?cls:'')+'" onclick="setA(\''+t.id+'\',\''+s+'\')">'+lbl[s]+'</button>';}).join('')+
  '</div></div>';}).join('')+

function setA(tid,st){ var d=getD(); d.attState[tid]=st; saveD(); go('pa'); }
function allP(){ var d=getD(); d.trainees.filter(function(t){return t.sup==='Sara Khalil';}).forEach(function(t){d.attState[t.id]='Present';}); saveD(); go('pa'); }
function subAtt(){ saveD(); toast('Attendance submitted at '+new Date().toLocaleTimeString(),'g'); }

PG.pm = function(){
  var d=getD(); var b=d.batches[0];
  var myT=d.trainees.filter(function(t){return t.bid===b.id&&t.sup==='Sara Khalil'&&t.status!=='Leaver';});

  return '<div class="ph"><div class="pt">Mistake Log</div><div class="ps">After each passive review block</div></div>'+
  '<div class="two"><div class="card"><div class="ch"><div class="ct">Log a Mistake</div></div>'+
  '<div class="fr"><div class="fl">Trainee</div><select class="fi" id="ml1"><option value="">— Select —</option>'+myT.map(function(t){return '<option value="'+t.id+'">'+t.name+'</option>';}).join('')+'</select></div>'+
  '<div class="fg2"><div class="fr"><div class="fl">Task</div><select class="fi" id="ml2">'+['Base','Pressure','Extras','Players','Location','Freeze Frame','Validation'].map(function(t){return '<option>'+t+'</option>';}).join('')+'</select></div>'+
  '<div class="fr"><div class="fl">Severity</div><select class="fi" id="ml3"><option>Minor</option><option>Major</option></select></div></div>'+

  '<div class="fr"><div class="fl">Description</div><input class="fi" id="ml5" placeholder="Brief description..."/></div>'+

  '<table class="tbl"><thead><tr><th>Trainee</th><th>Category</th><th>Task</th><th>Sev.</th></tr></thead><tbody>'+
  myL.slice(-8).map(function(l){return '<tr><td>'+l.tn+'</td><td style="color:#8b92a8">'+l.cat+'</td><td>'+l.task+'</td><td>'+pillAuto(l.sev==='Major'?'Fail':'Pending')+'</td></tr>';}).join('')+
  '</tbody></table></div></div>';
};
function subMist(){ var d=getD(); var tid=document.getElementById('ml1').value; var t=d.trainees.find(function(x){return x.id===tid;}); if(!t){toast('Select a trainee','r');return;} var cat=document.getElementById('ml4').value; var task=document.getElementById('ml2').value; d.mistakes.push({id:'m'+Date.now(),bid:'b82',tid:tid,tn:t.name,task:task,cat:cat,sev:document.getElementById('ml3').value,sup:'Sara Khalil',dt:new Date().toISOString().split('T')[0]}); var cnt=d.mistakes.filter(function(m){return m.tid===tid&&m.cat===cat;}).length; if(cnt>=3){d.alerts.unshift({type:'r',txt:t.name+': '+cnt+'x "'+cat+'"',time:'Just now'});toast('⚠ Persistent ('+cnt+'x) — alert sent','r');}else toast('Logged','g'); saveD(); go('pm'); }

  '<div class="fr"><div class="fl">Task discussed</div><select class="fi" id="fb2">'+['Base','Pressure','Location','Freeze Frame'].map(function(t){return '<option>'+t+'</option>';}).join('')+'</select></div>'+

function subFb(){ var d=getD(); var tid=document.getElementById('fb1').value; var t=d.trainees.find(function(x){return x.id===tid;}); if(!t){toast('Select trainee','r');return;} d.feedback.push({id:'f'+Date.now(),bid:'b82',tid:tid,tn:t.name,task:document.getElementById('fb2').value,action:document.getElementById('fb4').value,imp:document.getElementById('fb5').value,dt:new Date().toISOString().split('T')[0],sup:'Sara Khalil'}); saveD(); toast('Session logged','g'); go('pf'); }

PG.pe = function(){
  var d=getD();
  if(!d.eodCks)d.eodCks={};
  var items=[{k:'att',l:'Attendance submitted by 8:30 AM'},{k:'pol',l:'Policy items checked'},{k:'out',l:'Outlier flags reviewed'},{k:'lv',l:'Leaver events submitted (if any)'},{k:'sch',l:"Tomorrow's schedule posted to WhatsApp"}];

  items.map(function(item){return '<div class="cr" onclick="togCk(\''+item.k+'\')"><div class="chk '+(d.eodCks[item.k]?'on':'')+'">'+( d.eodCks[item.k]?'✓':'')+' </div><div class="ckl">'+item.l+'</div></div>';}).join('')+

function togCk(k){ var d=getD(); if(!d.eodCks)d.eodCks={}; d.eodCks[k]=!d.eodCks[k]; saveD(); go('pe'); }
function subEod(){ var d=getD(); var done=Object.values(d.eodCks||{}).filter(Boolean).length; if(done<3){toast('Complete at least 3 items','r');return;} var esc=document.getElementById('esc1').value; if(esc==='y'&&!document.getElementById('esc2').value){toast('Describe the escalation','r');return;} if(esc==='y')d.alerts.unshift({type:'a',txt:'EOD escalation: '+document.getElementById('esc2').value,time:'Just now'}); d.eodCks={}; saveD(); toast('EOD form submitted','g'); go('pe'); }

PG.ps = function(){
  var d=getD(); var b=d.batches[0]; var nd=b.day+1;
  var sch={3:'online',5:'onsite',8:'onsite',10:'online',12:'onsite',15:'onsite',16:'onsite',20:'onsite',21:'onsite',25:'onsite'};

  return '<div class="ph"><div class="pt">Daily Schedule</div><div class="ps">Day '+nd+' tomorrow</div></div>'+
  '<div class="card"><div class="ch"><div class="ct">WhatsApp Message</div></div><div class="wa" id="wam">'+msg+'</div>'+
  '<div class="wac" onclick="cpyMsg()">📋 Copy to clipboard</div></div>';
};
function cpyMsg(){ var el=document.getElementById('wam'); if(!el)return; navigator.clipboard.writeText(el.textContent).then(function(){toast('Copied — paste into WhatsApp','g');}).catch(function(){toast('Select text and copy manually','b');}); }

function saveBatch(){ var n=document.getElementById('nb1').value; if(!n){toast('Enter name','r');return;} getD().batches.push({id:'b'+Date.now(),name:n,dept:document.getElementById('nb2').value,day:1,week:1,trainees:0,start:document.getElementById('nb4').value,thr:parseInt(document.getElementById('nb3').value)||70,sup:document.getElementById('nb5').value,health:'green',att:0,pass:null,out:0,lv:0}); saveD(); closeModal(); toast(n+' created','g'); go('cb'); }

PG.ci = function(){
  var d=getD(); var b82=d.trainees.filter(function(t){return t.bid==='b82';});
  return '<div class="ph"><div class="pt">Trainee Intake</div><div class="ps">Batch 82 · '+b82.length+' enrolled</div><div style="margin-top:10px"><button class="btn btnp bsm" onclick="addTM()">+ Add Trainee</button></div></div>'+
  '<div class="card"><input class="si2" placeholder="Search..." oninput="filtT(this.value)"/>'+

function filtT(q){ var el=document.getElementById('ttbl'); if(!el)return; var q2=q.toLowerCase(); el.querySelector('tbody').innerHTML=getD().trainees.filter(function(t){return t.bid==='b82'&&(t.name.toLowerCase().includes(q2)||(t.nid||'').includes(q2));}).map(tRow).join(''); }

function saveTr(){ var n=document.getElementById('at1').value; if(!n){toast('Name required','r');return;} var sc=parseFloat(document.getElementById('at3').value)||0; var d=getD(); d.trainees.push({id:'t'+Date.now(),bid:'b82',name:n,nid:document.getElementById('at2').value,score:sc,perf:sc>=80?'High':sc>=65?'Average':'Low',status:'Active',sup:document.getElementById('at4').value}); var b=d.batches.find(function(x){return x.id==='b82';}); if(b)b.trainees++; saveD(); closeModal(); toast(n+' added','g'); go('ci'); }
